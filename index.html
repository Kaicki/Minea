<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft-Like Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="hud">
  <div id="crosshair">+</div>
  <div id="info">
    WASD / Joystick | Mouse/Touch: Look | Tap: Break | Btn: Place | Jump
  </div>
</div>

<div id="mobileControls">
  <div id="joystick">
    <div id="stick"></div>
  </div>

  <button id="jumpBtn">↑</button>
  <button id="placeBtn">⬛</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>

<script src="script.js"></script>
</body>
</html>
